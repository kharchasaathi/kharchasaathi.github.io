<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create Account — KharchaSaathi</title>

<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">

<style>
body{
  margin:0;
  padding:0;
  font-family:'Poppins',sans-serif;
  background:#eef2ff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.card{
  width:92%;
  max-width:380px;
  padding:28px;
  border-radius:16px;
  background:#fff;
  box-shadow:0 8px 30px rgba(0,0,0,0.10);
  border:1px solid #dbe1f0;
}
h2{
  margin:0 0 16px;
  text-align:center;
  font-weight:700;
  color:#2563eb;
  font-size:26px;
}
.sub-text{
  text-align:center;
  font-size:13px;
  color:#666;
  margin-bottom:10px;
}
input{
  width:100%;
  padding:12px 14px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #c7cce1;
  font-size:15px;
}
input:focus{
  border-color:#2563eb;
  outline:none;
}
.pass-wrap{
  position:relative;
}
.eye{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  cursor:pointer;
  color:#666;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  margin-top:6px;
  transition:.2s;
}
button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}
button:hover:not(:disabled){
  transform:translateY(-2px);
}
#msg{
  margin-top:10px;
  min-height:18px;
  text-align:center;
  font-size:13px;
}
.login-link{
  margin-top:14px;
  font-size:14px;
  text-align:center;
}
.login-link a{
  color:#2563eb;
  font-weight:600;
  text-decoration:none;
}
.plan-box{
  background:#f1f5ff;
  padding:10px;
  border-radius:10px;
  font-size:13px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Create Account</h2>

  <div class="plan-box">
    🎁 1 Month Free Trial<br>
    💎 Then ₹49 / 3 Months
  </div>

  <input id="email" type="email" placeholder="Email">

  <div class="pass-wrap">
    <input id="password" type="password" placeholder="Password (min 6 chars)">
    <span class="eye" id="pwEye">👁️</span>
  </div>

  <button id="signupBtn">Create Account</button>

  <div id="msg"></div>

  <div class="login-link">
    Already have an account? <a href="/login.html">Login</a>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-firestore-compat.js"></script>

<script src="/js/firebase.js"></script>

<script>
const qs = s => document.querySelector(s);

// password toggle
qs("#pwEye").addEventListener("click", () => {
  const pw = qs("#password");
  pw.type = pw.type === "password" ? "text" : "password";
});

// signup
qs("#signupBtn").addEventListener("click", async () => {

  const email = qs("#email").value.trim();
  const pass  = qs("#password").value.trim();
  const msg   = qs("#msg");
  const btn   = qs("#signupBtn");

  msg.textContent = "";

  if (!email || !pass){
    msg.style.color = "red";
    msg.textContent = "Enter email & password.";
    return;
  }

  if (pass.length < 6){
    msg.style.color = "red";
    msg.textContent = "Password must be at least 6 characters.";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Creating...";

  try {

    const userCred = await auth.createUserWithEmailAndPassword(email, pass);
    const user = userCred.user;

    /* SEND EMAIL VERIFICATION */
    await user.sendEmailVerification();

    /* 1 MONTH FREE TRIAL */
    const trialEnd = Date.now() + (30 * 24 * 60 * 60 * 1000);

    await db.collection("users").doc(user.uid).set({
      email: user.email,
      role: "owner",
      plan: "free_trial",
      trialEndsAt: trialEnd,
      subscriptionActive: false,
      subscriptionPlan: null,
      subscriptionPrice: 49,
      subscriptionDurationMonths: 3,
      subscriptionEndsAt: null,
      razorpayCustomerId: null,
      totalPayments: 0,
      createdAt: Date.now()
    });

    await auth.signOut();

    msg.style.color = "green";
    msg.textContent = "Verification email sent. Please verify before login.";

    btn.disabled = false;
    btn.textContent = "Create Account";

  } catch (err) {

    msg.style.color = "red";
    msg.textContent = err.message;
    btn.disabled = false;
    btn.textContent = "Create Account";
  }

});
</script>

</body>
</html>
