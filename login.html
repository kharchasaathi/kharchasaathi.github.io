<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Login — KharchaSaathi</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">

<style>
:root{
  --blue:#0A66C2;
  --bg:#f4f6f9;
  --card:#ffffff;
  --text:#111;
  --text-soft:#666;
  --radius:14px;
  --shadow:0 6px 18px rgba(0,0,0,0.08);
}
body{
  margin:0;
  padding:0;
  background:var(--bg);
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card{
  width:92%;
  max-width:420px;
  background:var(--card);
  padding:30px 28px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  border:1px solid #e5e7eb;
}
h2{
  margin:0 0 14px;
  font-weight:700;
  font-size:26px;
  text-align:center;
  color:var(--blue);
}
input{
  width:100%;
  padding:12px 14px;
  margin:10px 0;
  border-radius:var(--radius);
  border:1px solid #d1d5db;
  font-size:15px;
}
input:focus{
  border-color:var(--blue);
  outline:none;
}
.pw-wrapper{
  position:relative;
}
.pw-eye{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  cursor:pointer;
  color:#777;
}
button{
  padding:14px;
  width:100%;
  border:none;
  border-radius:var(--radius);
  background:var(--blue);
  color:#fff;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
  transition:.25s;
}
button:hover{
  opacity:.95;
  transform:translateY(-2px);
}
.muted{
  margin-top:12px;
  font-size:13px;
  color:var(--text-soft);
  text-align:center;
}
a{
  color:var(--blue);
  text-decoration:none;
  font-weight:600;
}
#msg{
  font-size:13px;
  margin-top:6px;
  text-align:center;
  min-height:20px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <form id="loginForm" novalidate>
    <input id="email" type="email" placeholder="Email" required>

    <div class="pw-wrapper">
      <input id="password" type="password" placeholder="Password" required>
      <span class="pw-eye" id="togglePw">👁️</span>
    </div>

    <button type="submit">Login</button>
  </form>

  <div id="msg"></div>

  <div class="muted">
    Don't have an account? <a href="/signup.html">Sign Up</a>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-firestore-compat.js"></script>

<script src="/js/firebase.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const qs = s => document.querySelector(s);
  const form = qs("#loginForm");
  const emailEl = qs("#email");
  const pwEl = qs("#password");
  const msgEl = qs("#msg");
  const toggle = qs("#togglePw");

  /* 👁️ Password Toggle */
  toggle.onclick = () => {
    pwEl.type = pwEl.type === "password" ? "text" : "password";
  };

  /* 🔐 LOGIN */
  form.addEventListener("submit", async e => {

    e.preventDefault();
    msgEl.style.color = "#444";
    msgEl.textContent = "Please wait...";

    try {

      const cred = await auth.signInWithEmailAndPassword(
        emailEl.value.trim(),
        pwEl.value.trim()
      );

      const user = cred.user;

      /* 📧 Email Verification Required */
      if (!user.emailVerified) {
        await auth.signOut();
        msgEl.style.color = "#d32f2f";
        msgEl.textContent = "Please verify your email before login.";
        return;
      }

      /* ✅ SUCCESS → Dashboard handles subscription check */
      window.location.href = "/tools/business-dashboard.html";

    } catch (err) {

      msgEl.style.color = "#d32f2f";
      msgEl.textContent = err.message || "Login failed.";

    }

  });

});
</script>

</body>
</html>
